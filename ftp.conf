# Nginx configuration for Reachable File Manager Frontend
# Placeholders replaced by deploy.sh: __FRONTEND_DOMAIN__, __BACKEND_DOMAIN__

server {
    listen 80;
    listen [::]:80;
    
    # SSL configuration - will be added by certbot
    # Uncomment after SSL certificate is installed:
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/__FRONTEND_DOMAIN__/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/__FRONTEND_DOMAIN__/privkey.pem;
    
    # Redirect HTTP to HTTPS - uncomment after SSL is configured
    # if ($scheme != "https") {
    #     return 301 https://$host$request_uri;
    # }
    
    server_name __FRONTEND_DOMAIN__;
    
    # Root directory - using symlink for nginx access
    # Symlink: /var/www/creative/dist/app -> /root/projects/Server-File-Manager/mainFile/dist
    root /var/www/creative/dist/app;
    index index.html index.htm;

    # Enable MIME types for all web file types
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    
    # Charset configuration
    charset utf-8;
    source_charset utf-8;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        text/javascript 
        text/json
        application/x-javascript 
        application/xml+rss 
        application/javascript 
        application/json
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/truetype
        font/opentype
        application/vnd.ms-fontobject
        application/x-font-ttf;
    gzip_disable "MSIE [1-6]\.";
    
    # Support range requests for large files (videos, etc.)
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Security headers (global)
    # Note: X-Frame-Options SAMEORIGIN blocks iframes unless parent is same origin.
    # Hosted HTML in /var/www/creative/uploads/files gets frame-ancestors * in its locations so previews/embeds work.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    
    # CORS headers for preview/preview functionality (allow same-origin by default)
    # Uncomment if you need to allow cross-origin requests for previews
    # add_header Access-Control-Allow-Origin "*" always;
    # add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
    # add_header Access-Control-Allow-Headers "Range" always;

    # Service Worker - MUST be served with correct headers and no-cache
    location = /sw.js {
        add_header Content-Type "application/javascript; charset=utf-8" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # Manifest - serve with correct MIME type for PWA
    location = /manifest.json {
        add_header Content-Type "application/manifest+json; charset=utf-8" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # Logo/Icons for PWA
    location = /icon.png {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # API requests - proxy to backend API server
    # This allows /api/* requests on frontend domain to work correctly
    # Proxies to the Express backend on localhost:3000
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Important for sessions/cookies to work
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;
        
        # Timeouts for file uploads/downloads (large files)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Disable buffering for large file downloads
        # Critical for streaming downloads without buffering
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_max_temp_file_size 0;
        
        # Explicitly pass all response headers (nginx passes headers by default, but be explicit)
        # These headers are critical for downloads to work correctly
        proxy_pass_header Content-Type;
        proxy_pass_header Content-Disposition;
        proxy_pass_header Content-Length;
        proxy_pass_header Accept-Ranges;
        proxy_pass_header Content-Range;
        proxy_pass_header Cache-Control;
        proxy_pass_header ETag;
        proxy_pass_header Set-Cookie;
        
        # Don't hide any headers that might be needed
        # Ensure Content-Disposition header is not modified
        proxy_hide_header X-Powered-By;
        
        # Support range requests for downloads (videos, large files)
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
        
        # Increase client body size for file uploads (1GB)
        client_max_body_size 1G;
        
        # Add CORS headers if needed (for cross-origin requests)
        # Uncomment if you need CORS support
        # add_header Access-Control-Allow-Origin "$http_origin" always;
        # add_header Access-Control-Allow-Credentials "true" always;
        # add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        # add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
    }

    # API also available on __BACKEND_DOMAIN__ (optional). Prefer same-origin /api above.

    # Simple download endpoint: /download/file?name=path/to/file.zip
    # Supports two formats:
    # 1. Query parameter: /download/file?name=Berger/illusions/archive.zip
    # 2. Path-based: /download/file/Berger/illusions/archive.zip
    # Note: Proxy directives cannot be inside if{} in nginx - use internal redirect
    location = /download/file {
        if ($arg_name = "") {
            return 400 '{"error": "File name required. Use ?name=path/to/file"}';
        }
        rewrite ^ /download/file_proxy$is_args$args last;
    }
    location = /download/file_proxy {
        internal;
        proxy_pass http://localhost:3000/api/download?path=$arg_name;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_max_temp_file_size 0;
        proxy_pass_header Content-Type;
        proxy_pass_header Content-Disposition;
        proxy_pass_header Content-Length;
        proxy_pass_header Accept-Ranges;
        proxy_pass_header Content-Range;
        proxy_pass_header Cache-Control;
        proxy_pass_header ETag;
        proxy_pass_header Set-Cookie;
        proxy_hide_header X-Powered-By;
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
    }
    
    # Path-based format: /download/file/path/to/file.zip
    # This format automatically URL-decodes the path
    location ~ ^/download/file/(.+)$ {
        # Capture the file path (nginx automatically URL-decodes $1)
        set $file_path $1;
        
        # Proxy to backend API with the decoded path
        proxy_pass http://localhost:3000/api/download?path=$file_path;
        
        # Proxy settings
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;
        
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_max_temp_file_size 0;
        
        proxy_pass_header Content-Type;
        proxy_pass_header Content-Disposition;
        proxy_pass_header Content-Length;
        proxy_pass_header Accept-Ranges;
        proxy_pass_header Content-Range;
        proxy_pass_header Cache-Control;
        proxy_pass_header ETag;
        proxy_pass_header Set-Cookie;
        proxy_hide_header X-Powered-By;
        
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
    }

    # Assets folder (React app assets only) - cache aggressively
    location /assets/ {
        root /var/www/creative/dist/app;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Static assets from React app /assets/ directory only
    location ~* ^/assets/.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/creative/dist/app;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Config files from React app only
    location = /config.js {
        root /var/www/creative/dist/app;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }
    
    location = /config.json {
        root /var/www/creative/dist/app;
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # Serve static files from creative directory (uploaded files)
    # This allows direct access to HTML files and their assets
    # Example: /apex/index.html serves from /root/projects/Server-File-Manager/creative/apex/index.html
    # Example: /hello/image/bg.png serves from /root/projects/Server-File-Manager/creative/hello/image/bg.png
    # This MUST come before the React Router location block
    # Using ^~ prefix modifier to stop regex processing and alias for correct path mapping
    
    # Named location to fall back to React app if file not found in creative
    location @react_fallback {
        root /var/www/creative/dist/app;
        try_files /index.html =404;
        
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }
    
    # Root path - serve React app (exact match takes highest precedence)
    location = / {
        root /var/www/creative/dist/app;
        try_files /index.html =404;
        
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # Serve asset files (with extensions) from creative directory
    # This matches files like .mp4, .css, .js, .png, etc.
    # Supports URL-encoded paths (spaces as %20, etc.)
    location ~ ^/.+\.(mp4|webm|ogg|ogv|avi|mov|mkv|mp3|wav|flac|aac|m4a|oga|jpg|jpeg|png|gif|ico|svg|webp|bmp|tiff|tif|heic|heif|css|js|json|woff|woff2|ttf|otf|eot|pdf|zip|rar|7z|tar|gz|bz2|xz|html|htm|xml|txt|rtf|doc|docx|xls|xlsx|ppt|pptx|swf|flv|3gp|3g2|asf|wmv|mpeg|mpg|ts|m3u8|vtt|srt|ass|ssa|vob|iso|bin|cue)$ {
        # Security: Prevent directory traversal
        if ($uri ~ "\.\.") {
            return 403;
        }
        
        # Decode URL-encoded paths (handles %20 for spaces, etc.)
        # Nginx automatically decodes %xx sequences in $uri, but we need to handle it properly
        # Use alias to map URI directly to creative directory via symlink
        alias /var/www/creative/uploads/files$uri;
        
        # For asset files: try file directly, then 404
        try_files $uri =404;
        
        # Enable range requests for large files (videos, etc.)
        add_header Accept-Ranges bytes always;
        
        # Set proper MIME types and cache headers based on file extension
        if ($uri ~* \.(html|htm)$) {
            add_header Content-Type "text/html; charset=utf-8" always;
            add_header Cache-Control "public, max-age=300, must-revalidate" always;
            # Hosted creatives: allow iframe preview/embed (tools, dashboards, etc.)
            add_header Content-Security-Policy "frame-ancestors *" always;
        }
        if ($uri ~* \.(css)$) {
            add_header Content-Type "text/css; charset=utf-8" always;
            add_header Cache-Control "public, max-age=3600" always;
        }
        if ($uri ~* \.(js)$) {
            add_header Content-Type "application/javascript; charset=utf-8" always;
            add_header Cache-Control "public, max-age=3600" always;
        }
        if ($uri ~* \.(json)$) {
            add_header Content-Type "application/json; charset=utf-8" always;
            add_header Cache-Control "public, max-age=3600" always;
        }
        if ($uri ~* \.(jpg|jpeg|png|gif|ico|svg|webp|bmp|tiff|tif|heic|heif)$) {
            add_header Cache-Control "public, max-age=86400" always;
            access_log off;
        }
        if ($uri ~* \.(mp4|webm|ogg|ogv|avi|mov|mkv|flv|swf|3gp|3g2|asf|wmv|mpeg|mpg|ts|m3u8)$) {
            add_header Cache-Control "public, max-age=86400" always;
            # Enable range requests for video files
            add_header Accept-Ranges bytes always;
        }
        if ($uri ~* \.(mp3|wav|flac|aac|m4a|oga)$) {
            add_header Cache-Control "public, max-age=86400" always;
            add_header Accept-Ranges bytes always;
        }
        if ($uri ~* \.(woff|woff2|ttf|otf|eot)$) {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            access_log off;
        }
        if ($uri ~* \.(pdf)$) {
            add_header Cache-Control "public, max-age=86400" always;
        }
        if ($uri ~* \.(zip|rar|7z|tar|gz|bz2|xz)$) {
            add_header Cache-Control "public, max-age=86400" always;
            add_header Content-Disposition "attachment" always;
        }
    }

    # Serve directories and paths without extensions from creative directory
    # This matches paths like /dano, /apex, /lyx/1-6-26, etc. (no file extension)
    # Supports URL-encoded paths (spaces as %20)
    # For these, try index.html first
    location ~ ^/(.+)$ {
        # Security: Prevent directory traversal
        if ($uri ~ "\.\.") {
            return 403;
        }
        
        # Use root instead of alias for better try_files support
        # Root: /var/www/creative/uploads/files
        # URI: /dano -> /var/www/creative/uploads/files/dano
        # URI: /lyx/1-6-26 -> /var/www/creative/uploads/files/lyx/1-6-26
        # URI: /lyx/1-6-26/full%20animation -> /var/www/creative/uploads/files/lyx/1-6-26/full animation
        root /var/www/creative/uploads/files;
        
        # Disable directory listing for security
        autoindex off;
        
        # For directories/paths: try index.html first, then the path, then fallback
        # Nginx automatically decodes URL-encoded paths in $uri
        # With root, try_files resolves correctly even with spaces (%20)
        try_files $uri/index.html $uri $uri/ @react_fallback;
        
        # Set proper headers for HTML files
        if ($uri ~* \.(html|htm)$) {
            add_header Content-Type "text/html; charset=utf-8" always;
            add_header Cache-Control "public, max-age=300, must-revalidate" always;
        }
        # Default content type for directories (should serve index.html)
        default_type text/html;

        # Directory URLs (e.g. /Ai_image/2/) serve index.html; allow iframe embed for hosted creatives
        add_header Content-Security-Policy "frame-ancestors *" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
    }

    # Fallback for React app routes (catches paths that didn't match above)
    location / {
        root /var/www/creative/dist/app;
        try_files $uri $uri/ /index.html;
        
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        # Admin SPA: discourage third-party embedding (clickjacking). Same-origin iframes still OK.
        add_header X-Frame-Options "SAMEORIGIN" always;
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

