# Nginx configuration for Reachable File Manager Frontend
# Frontend domain: creative.reachableads.com
# Backend API: api.creative.reachableads.com (separate server, no proxy needed)

server {
    listen 80;
    listen [::]:80;
    
    # SSL configuration - will be added by certbot
    # Uncomment after SSL certificate is installed:
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/creative.reachableads.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/creative.reachableads.com/privkey.pem;
    
    # Redirect HTTP to HTTPS - uncomment after SSL is configured
    # if ($scheme != "https") {
    #     return 301 https://$host$request_uri;
    # }
    
    server_name creative.reachableads.com;
    
    # Root directory - production path
    root /root/projects/Server-File-Manager/mainFile/dist;
    index index.html;

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;
    gzip_disable "MSIE [1-6]\.";

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Service Worker - MUST be served with correct headers and no-cache
    location = /sw.js {
        add_header Content-Type "application/javascript; charset=utf-8" always;
        add_header Service-Worker-Allowed "/" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # Manifest - serve with correct MIME type for PWA
    location = /manifest.json {
        add_header Content-Type "application/manifest+json; charset=utf-8" always;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri =404;
    }

    # Logo/Icons for PWA
    location = /icon.png {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    # Note: API requests go directly to api.creative.reachableads.com
    # No proxy needed - frontend makes direct requests via config.js API_URL

    # Static assets - cache aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Assets folder - cache aggressively
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Config.js - can be cached but may change, so shorter cache
    location = /config.js {
        expires 1h;
        add_header Cache-Control "public, max-age=3600";
        try_files $uri =404;
    }

    # React Router (SPA) - serve index.html for all routes
    # This MUST come last to catch all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
        
        # Don't cache index.html - always serve fresh version
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Error pages
    error_page 404 /index.html;
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}

