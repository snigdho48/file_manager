<!doctype html>
<html lang="en" class="">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="alternate icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Reachableads — high-performance online file manager" />
    <meta name="theme-color" content="#E5601E" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon.png" />
    <title>Reachableads</title>
    <!-- Runtime configuration (optional - can be modified after build) -->
    <script src="/config.js"></script>
    <script>
      // Dark mode initialization to avoid FOUC
      const theme = localStorage.getItem('theme');
      const isDark = theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.classList.toggle('dark', isDark);
      
      // Register Service Worker for PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then((registration) => {
              console.log('[PWA] Service Worker registered successfully:', registration.scope);
              
              // Check if there's an update available
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                console.log('[PWA] New service worker found, installing...');
                newWorker.addEventListener('statechange', () => {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('[PWA] New service worker installed, reload to activate');
                  }
                });
              });
              
              // Check for updates periodically
              setInterval(() => {
                registration.update();
              }, 60000); // Check every minute
            })
            .catch((error) => {
              console.error('[PWA] Service Worker registration failed:', error);
            });
        });
        
        // Log service worker controller status
        if (navigator.serviceWorker.controller) {
          console.log('[PWA] Service Worker is controlling this page');
        } else {
          console.log('[PWA] Service Worker will control this page after reload');
        }
      } else {
        console.log('[PWA] Service Workers are not supported in this browser');
      }
    </script>
  </head>
  <body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
