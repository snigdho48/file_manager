# Nginx configuration for Reachable File Manager Backend API
# Backend API domain: api.creative.reachableads.com
# Proxies to: localhost:3000 (Express server)

server {
    listen 80;
    listen [::]:80;
    
    # SSL configuration - will be added by certbot
    # Uncomment after SSL certificate is installed:
    # listen 443 ssl http2;
    # listen [::]:443 ssl http2;
    # ssl_certificate /etc/letsencrypt/live/api.creative.reachableads.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/api.creative.reachableads.com/privkey.pem;
    
    # Redirect HTTP to HTTPS - uncomment after SSL is configured
    # if ($scheme != "https") {
    #     return 301 https://$host$request_uri;
    # }
    
    server_name api.creative.reachableads.com;

    # Proxy all requests to Express backend
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Important for sessions/cookies to work
        proxy_set_header Cookie $http_cookie;
        proxy_cookie_path / /;
        
        # Timeouts for file uploads (large files)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Disable buffering for large file uploads
        proxy_request_buffering off;
        proxy_buffering off;
        
        # Increase client body size for file uploads (1GB)
        client_max_body_size 1G;
    }

    # Gzip compression for better performance
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/javascript application/json;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}

